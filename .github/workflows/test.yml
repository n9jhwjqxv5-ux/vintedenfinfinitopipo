name: Tests & Validation

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501
        continue-on-error: true
      
      - name: Type check with mypy
        run: |
          pip install mypy
          mypy main.py config_models.py metrics.py --ignore-missing-imports
        continue-on-error: true
      
      - name: Run tests
        run: |
          pytest test_bot.py -v --tb=short --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true
  
  validate-config:
    name: Validation Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic python-dotenv
      
      - name: Create test .env
        run: |
          echo "TOKEN=test_token_" > .env
          python -c "import secrets; token = 'test_token_' + secrets.token_hex(30); open('.env', 'w').write(f'TOKEN={token}\n')"
      
      - name: Validate models_config.json
        run: |
          python -c "import json; data = json.load(open('models_config.json')); print(f'✅ {len(data)} modèles')"
      
      - name: Run validation script
        run: |
          python validate_config.py
        continue-on-error: true
  
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f screen
        continue-on-error: true
      
      - name: Check for secrets
        run: |
          # Vérifier qu'aucun secret n'est commité
          if grep -r "sk-[a-zA-Z0-9]" . --exclude-dir=.git --exclude="*.md"; then
            echo "⚠️  Secrets potentiels détectés"
            exit 1
          fi
        continue-on-error: true
